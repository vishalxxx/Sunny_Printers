name: Sunny Printers Release

on:

  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  release:
    name: Enterprise Release Pipeline
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      #######################################
      # PACKAGE & PUBLISH
      #######################################

      - name: Package & Publish Application
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          powershell ./release.bat -Increment none --publish

      #######################################
      # Upload Build Artifacts (Debug)
      #######################################

      - name: Upload Release Files
        uses: actions/upload-artifact@v4
        with:
          name: SunnyPrintersRelease
          path: |
            target/dist/**
            target/*.jar
            target/**/*.msi
            target/**/*.zip
            target/**/*.sha256
          if-no-files-found: ignore

      - name: Upload Diagnostic Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DiagnosticsAndReports
          path: |
            Release/Build/Logs/**
            target/surefire-reports/**
            target/failsafe-reports/**
            target/site/**
          if-no-files-found: ignore
