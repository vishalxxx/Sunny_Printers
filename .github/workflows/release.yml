name: Sunny Printers Release

on:

  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  release:
    name: Enterprise Release Pipeline
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      #######################################
      # PACKAGE & PUBLISH
      #######################################

      - name: Package & Publish Application
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
          TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          TEST_SUPABASE_KEY: ${{ secrets.TEST_SUPABASE_KEY }}
          TEST_SUPABASE_BUCKET: ${{ secrets.TEST_SUPABASE_BUCKET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          powershell ./release.bat -Increment none --publish

      #######################################
      # Upload Build Artifacts (Debug)
      #######################################

      - name: Upload Release Files
        uses: actions/upload-artifact@v4
        with:
          name: SunnyPrintersRelease
          path: |
            target/dist/**
            target/*.jar
            target/**/*.msi
            target/**/*.zip
            target/**/*.sha256
          if-no-files-found: ignore
