name: Sunny Printers CI

on:
  push:
    branches:
      - vishal
      - dell
      - mac
      - main

  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-and-test:

    name: Build, Unit & Integration Tests

    runs-on: windows-latest

    timeout-minutes: 30

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Java Version
        run: java -version

      - name: Maven Version
        run: mvn -version

      - name: Validate Project
        run: mvn validate

      #######################################
      # UNIT
      #######################################

      - name: Unit Tests
        run: mvn test -Punit

      #######################################
      # SANITY
      #######################################

      - name: Sanity Tests
        run: mvn test -Psanity

      #######################################
      # INTEGRATION
      #######################################

      - name: Integration Tests
        if: github.event_name == 'pull_request'
        env:
          TEST_DB_DIR: database_test
        run: mvn verify -Pintegration

      #######################################
      # Upload Reports
      #######################################

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports
            target/failsafe-reports
          if-no-files-found: ignore

      #######################################
      # Upload JAR
      #######################################

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar
          if-no-files-found: ignore

